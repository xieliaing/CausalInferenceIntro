    center: "Power by Quarto"
    right: "[GitHub 仓库](https://github.com/pumc-zhou/CausalInferenceIntro)"

format:
  html:
    theme: cosmo
    css: styles.css
    page-layout: article
    smooth-scroll: true
    toc: true
    toc-location: right
    toc-title: 本页目录
    toc-expand: 2
    toc-depth: 3
    code-copy: true
    anchor-sections: true
    link-external-newwindow: true
    grid:
      body-width: 980px
      sidebar-width: 300px
      margin-width: 220px
    lang: zh-CN

execute:
  freeze: auto

render:
  - index.qmd
  - chapters/*.ipynb
  - "!chapters/.ipynb_checkpoints/**"
